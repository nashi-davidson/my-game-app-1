<!DOCTYPE html>
<html>
<head>
    <title>My Game App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="background:black; color:#00ff88; margin:0; font-family:Arial;">

<!-- HEADER -->
<div style="text-align:center; padding:30px 10px 10px;">
    <h2 style="margin:0; font-size:20px;">UK SOURCE</h2>
    <h4 style="margin:5px 0 10px; font-size:14px;">MAY PERFORMANCE RESULTS</h4>
</div>

<!-- TABLE -->
<table border="1" style="width:95%; margin:10px auto; border-collapse:collapse; border-color:red; text-align:center;">

<tr>
    <th>Day</th>
    <th>Match</th>
    <th>Selection</th>
    <th>Odds</th>
    <th>Result</th>
    <th>Status</th>
</tr>

<script>
for (let i = 1; i <= 31; i++) {
    document.write(`
    <tr>
        <td>${i}</td>
        <td>-</td>
        <td>-</td>
        <td>-</td>
        <td>-</td>
        <td>-</td>
    </tr>
    `);
}
</script>

</table>

</body>
</html>
