<!DOCTYPE html>
<html>
<head>
    <title>UK SOURCE</title>

    <style>
        body {
            background: #0d1117;
            color: #00ffcc;
            font-family: Arial, sans-serif;
            text-align: center;
        }

        h1 {
            font-size: 20px;
            margin-top: 10px;
        }

        h2 {
            font-size: 14px;
            margin-bottom: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th, td {
            border: 1px solid red;
            padding: 6px;
            font-size: 12px;
        }

        th {
            background: #111;
        }

        /* Column sizes */
        th:nth-child(1), td:nth-child(1) { width: 8%; }   /* Day */
        th:nth-child(2), td:nth-child(2) { width: 40%; }  /* Match */
        th:nth-child(3), td:nth-child(3) { width: 18%; }  /* Selection */
        th:nth-child(4), td:nth-child(4) { width: 10%; }  /* Odds */
        th:nth-child(5), td:nth-child(5) { width: 10%; }  /* Result */
        th:nth-child(6), td:nth-child(6) { width: 10%; }  /* Status */

    </style>
</head>

<body>

    <h1>UK SOURCE</h1>
    <h2>MAY PERFORMANCE RESULTS</h2>

    <table>
        <tr>
            <th>Day</th>
            <th>Match</th>
            <th>Selection</th>
            <th>Odds</th>
            <th>Result</th>
            <th>Status</th>
        </tr>

        <script>
            for (let i = 1; i <= 30; i++) {
                document.write(`
                    <tr>
                        <td>${i}</td>
                        <td></td>
                        <td></td>
                        <td></td>
                        <td></td>
                        <td></td>
                    </tr>
                `);
            }
        </script>

    </table>

</body>
</html>
