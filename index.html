<!DOCTYPE html>
<html>
<head>
  <title>UK SOURCE</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: black;
      color: #00ffcc;
      font-family: Arial;
      text-align: center;
    }

    h1 {
      margin-top: 20px;
    }

    .table-container {
      overflow-x: auto; /* makes table fit on mobile */
      padding: 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 600px; /* prevents squeezing */
    }

    th, td {
      border: 1px solid red;
      padding: 8px;
      font-size: 12px;
      text-align: center;
    }

  </style>
</head>

<body>

<!-- APP (DIRECT ACCESS) -->
<h1>UK SOURCE</h1>

<div class="table-container">
  <table id="dataTable">
    <tr>
      <th>Day</th>
      <th>Match</th>
      <th>Selection</th>
      <th>Odds</th>
      <th>Result</th>
      <th>Status</th>
    </tr>
  </table>
</div>

<script>
  const table = document.getElementById("dataTable");

  for (let i = 1; i <= 30; i++) {
    let row = table.insertRow();

    row.innerHTML = `
      <td>${i}</td>
      <td contenteditable="true"></td>
      <td contenteditable="true"></td>
      <td contenteditable="true"></td>
      <td contenteditable="true"></td>
      <td contenteditable="true"></td>
    `;
  }
</script>

</body>
</html>
