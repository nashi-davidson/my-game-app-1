<!DOCTYPE html>
<html>
<head>
  <title>My Game App</title>
</head>

<body style="background:black; color:#00ff88; text-align:center;">

  <h2>MAY MATCHES</h2>

  <table border="1" style="width:95%; margin:auto;">
    <tr>
      <th>Day</th>
      <th>Match</th>
      <th>Time</th>
      <th>Outcome</th>
      <th>Result</th>
      <th>Status</th>
    </tr>

    <script>
      for (let i = 1; i <= 31; i++) {
        document.write(`
          <tr>
            <td>${i}</td>
            <td>-</td>
            <td>-</td>
            <td>-</td>
            <td>-</td>
            <td>?</td>
          </tr>
        `);
      }
    </script>

  </table>

</body>
</html>
